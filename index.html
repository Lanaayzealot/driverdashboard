<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Recruitment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fa;
    --surface: #ffffff;
    --border: #e0e4ef;
    --accent: #c49a0a;
    --accent2: #2a7fd4;
    --accent3: #1aaa6a;
    --accent-red: #e03e3e;
    --text: #1a1e2e;
    --muted: #8892a4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }
  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 800;
    color: var(--text);
  }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }
  .live-clock { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text); margin-top: 8px; letter-spacing: 1px; }
  .live-clock span { color: var(--muted); font-size: 0.75rem; font-weight: 400; font-family: 'DM Sans', sans-serif; margin-left: 6px; letter-spacing: 1.5px; text-transform: uppercase; }

  .save-indicator {
    position: fixed; top: 16px; right: 16px;
    background: var(--accent3); color: #fff;
    padding: 6px 14px; border-radius: 20px;
    font-size: 0.78rem; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; z-index: 999;
  }
  .save-indicator.show { opacity: 1; }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.08); }

  .card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    background: #f8f9fd;
  }
  .card-icon { font-size: 1.4rem; }
  .card-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); flex: 1; }
  .div-status {
    font-size: 0.72rem; padding: 4px 12px; border-radius: 20px;
    white-space: nowrap; cursor: pointer; user-select: none;
    font-weight: 700; letter-spacing: 0.5px;
    transition: transform 0.1s;
  }
  .div-status:active { transform: scale(0.95); }
  .div-status-hiring { background: rgba(224,62,62,0.1); border: 1px solid rgba(224,62,62,0.35); color: var(--accent-red); }
  .div-status-full { background: rgba(26,170,106,0.1); border: 1px solid rgba(26,170,106,0.35); color: var(--accent3); }
  .div-status-urgent { background: rgba(224,62,62,0.15); border: 1px solid var(--accent-red); color: var(--accent-red); animation: urgentPulse 1.2s ease-in-out infinite; }
  @keyframes urgentPulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,62,62,0.35);} 50%{box-shadow:0 0 0 5px rgba(224,62,62,0);} }

  .progress-bar-wrap {
    padding: 12px 20px 10px;
    border-bottom: 1px solid var(--border);
    background: #fafbfe;
    display: flex; align-items: center; gap: 14px;
  }
  .progress-bar-track {
    flex: 1; height: 8px; background: #e8ecf5; border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent3), #0fd47a);
    transition: width 0.4s ease;
  }
  .progress-label {
    font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.82rem;
    white-space: nowrap; min-width: 60px; text-align: right;
  }
  .progress-label span { color: var(--muted); font-weight: 400; font-family: 'DM Sans', sans-serif; }
  .slots-count-edit {
    font-size: 0.74rem; color: var(--muted); cursor: pointer;
    background: none; border: 1px dashed var(--border); padding: 3px 9px;
    border-radius: 6px; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .slots-count-edit:hover { border-color: var(--accent); color: var(--accent); }
  .last-updated {
    font-size: 0.72rem; color: var(--muted); cursor: pointer;
    background: none; border: 1px dashed var(--border); padding: 3px 9px;
    border-radius: 6px; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .last-updated:hover { border-color: var(--accent2); color: var(--accent2); }

  .slots-section { padding: 16px 20px; }
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .slot-covered {
    background: #f8f9fd;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    position: relative;
    transition: box-shadow 0.15s;
    animation: slotIn 0.2s ease;
  }
  .slot-covered:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
  @keyframes slotIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }

  .slot-name { font-weight: 600; font-size: 0.88rem; color: var(--text); }
  .slot-company { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
  .slot-position { font-size: 0.74rem; color: var(--accent2); font-weight: 600; margin-top: 2px; }
  .slot-notes { font-size: 0.74rem; color: var(--muted); margin-top: 2px; font-style: italic; min-height: 14px; }
  .slot-badge-row { margin-top: 7px; }

  .badge {
    font-size: 0.65rem; padding: 3px 8px; border-radius: 20px;
    white-space: nowrap; cursor: pointer; user-select: none;
    display: inline-block; font-weight: 700;
    transition: transform 0.1s;
  }
  .badge:active { transform: scale(0.95); }
  .badge-ready { background: rgba(26,170,106,0.1); border: 1px solid rgba(26,170,106,0.3); color: var(--accent3); }
  .badge-preapproval { background: rgba(42,127,212,0.1); border: 1px solid rgba(42,127,212,0.3); color: var(--accent2); }
  .badge-pending { background: rgba(196,154,10,0.1); border: 1px solid rgba(196,154,10,0.3); color: var(--accent); }

  .slot-delete {
    position: absolute; top: 5px; right: 5px;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.72rem; padding: 2px 5px;
    border-radius: 4px; opacity: 0; transition: opacity 0.2s, color 0.2s;
  }
  .slot-covered:hover .slot-delete { opacity: 1; }
  .slot-delete:hover { color: var(--accent-red); }

  .slot-empty {
    border: 2px dashed #d6dce8;
    border-radius: 10px;
    padding: 20px 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer; color: #b0bac9;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    min-height: 80px;
    font-size: 0.78rem;
    animation: slotIn 0.2s ease;
  }
  .slot-empty:hover {
    border-color: var(--accent);
    background: rgba(196,154,10,0.04);
    color: var(--accent);
  }
  .badge-hired { background: rgba(26,170,106,0.15); border: 1px solid rgba(26,170,106,0.4); color: var(--accent3); }

  /* HIRED THIS WEEK REPORT */
  .hired-report {
    max-width: 1200px; margin: 0 auto 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .hired-report-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: linear-gradient(135deg, #1a3a3a, #2a5454);
    cursor: pointer;
  }
  .hired-report-header-left { display: flex; align-items: center; gap: 10px; }
  .hired-report-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1rem; color: #fff; }
  .hired-count-badge {
    background: var(--accent3); color: #fff;
    font-family: 'Montserrat', sans-serif; font-weight: 800;
    font-size: 0.8rem; padding: 3px 10px; border-radius: 20px;
  }
  .hired-week-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; }
  .hired-toggle { color: rgba(255,255,255,0.6); font-size: 0.85rem; transition: transform 0.2s; }
  .hired-toggle.open { transform: rotate(180deg); }
  .hired-report-body { padding: 16px 20px; }
  .hired-empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 20px 0; }
  .hired-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .hired-card {
    background: linear-gradient(135deg, #f0fdf6, #e8faf1);
    border: 1px solid rgba(26,170,106,0.25);
    border-radius: 10px; padding: 12px 14px;
    position: relative; animation: slotIn 0.25s ease;
  }
  .hired-card-name { font-weight: 700; font-size: 0.88rem; color: var(--text); }
  .hired-card-division { font-size: 0.72rem; font-weight: 700; color: var(--accent3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
  .hired-card-meta { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
  .hired-card-date { font-size: 0.7rem; color: var(--muted); margin-top: 6px; font-style: italic; }
  .hired-card-delete {
    position: absolute; top: 5px; right: 5px;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.72rem; padding: 2px 5px;
    border-radius: 4px; opacity: 0; transition: opacity 0.2s, color 0.2s;
  }
  .hired-card:hover .hired-card-delete { opacity: 1; }
  .hired-card-delete:hover { color: var(--accent-red); }
  .hired-report-footer {
    padding: 10px 20px 14px;
    display: flex; justify-content: flex-end;
  }
  .clear-hired-btn {
    font-size: 0.74rem; color: var(--muted); cursor: pointer;
    background: none; border: 1px dashed var(--border); padding: 3px 10px;
    border-radius: 6px; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
  }
  .clear-hired-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

  [contenteditable="true"] {
    outline: none; border-radius: 3px; cursor: text;
    transition: background 0.15s; padding: 1px 3px; margin: -1px -3px;
  }
  [contenteditable="true"]:hover { background: rgba(0,0,0,0.04); }
  [contenteditable="true"]:focus { background: rgba(196,154,10,0.08); box-shadow: 0 0 0 1px rgba(196,154,10,0.35); }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 16px;
    padding: 28px; width: min(420px, 95vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: modalIn 0.2s ease;
  }
  .slots-modal {
    background: var(--surface); border-radius: 16px;
    padding: 24px; width: min(300px, 90vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(10px);} to{opacity:1;transform:none;} }
  .modal h3, .slots-modal h3 { font-family:'Montserrat',sans-serif; font-size:1rem; font-weight:800; margin-bottom:20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display:block; font-size:0.78rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
  .form-group input, .form-group select {
    width:100%; padding:9px 12px; border:1px solid var(--border);
    border-radius:8px; font-size:0.88rem; font-family:'DM Sans',sans-serif;
    color:var(--text); background:var(--surface); outline:none;
    transition:border-color 0.15s;
  }
  .form-group input[type=number] { font-size:1.2rem; font-family:'Montserrat',sans-serif; font-weight:700; text-align:center; }
  .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-primary {
    flex:1; padding:10px; background:var(--text); color:#fff;
    border:none; border-radius:9px; font-weight:700;
    font-size:0.88rem; cursor:pointer; font-family:'DM Sans',sans-serif;
    transition:background 0.15s;
  }
  .btn-primary:hover { background:#2d3450; }
  .btn-cancel {
    padding:10px 18px; background:transparent; color:var(--muted);
    border:1px solid var(--border); border-radius:9px; font-weight:600;
    font-size:0.88rem; cursor:pointer; font-family:'DM Sans',sans-serif;
  }
  .btn-cancel:hover { background:var(--bg); }
</style>
</head>
<body>
<div class="save-indicator" id="saveInd">✓ Saved</div>

<header>
  <h1>🚛 Driver Recruitment Dashboard</h1>
  <p id="headerDate"></p>
  <div class="live-clock" id="liveClock">--:-- --<span>CDT</span></div>
</header>

<div class="hired-report" id="hiredReport">
  <div class="hired-report-header" onclick="toggleHiredReport()">
    <div class="hired-report-header-left">
      <span style="font-size:1.3rem">🏆</span>
      <span class="hired-report-title">Hired This Week</span>
      <span class="hired-count-badge" id="hiredCount">0</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="hired-week-label" id="hiredWeekLabel"></span>
      <span class="hired-toggle" id="hiredToggle">▼</span>
    </div>
  </div>
  <div id="hiredReportBody" style="display:none;">
    <div class="hired-report-body" id="hiredGrid"></div>
    <div class="hired-report-footer">
      <button class="clear-hired-btn" onclick="clearHired()">🗑 Clear this week</button>
    </div>
  </div>
</div>

<div class="grid" id="dash"></div>

<!-- Add Driver Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">➕ Add Driver</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveModalEntry()">Save Driver</button>
    </div>
  </div>
</div>

<!-- Slots Count Modal -->
<div class="modal-overlay" id="slotsModalOverlay">
  <div class="slots-modal">
    <h3>✏️ Set Total Slots</h3>
    <div class="form-group">
      <label>Total spots for this division</label>
      <input type="number" id="slotsCountInput" min="1" max="99" value="10">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSlotsModal()">Cancel</button>
      <button class="btn-primary" onclick="saveSlotsCount()">Save</button>
    </div>
  </div>
</div>

<script>
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function updateClock(){
  const now = new Date();
  const cdt = now.toLocaleTimeString('en-US',{timeZone:'America/Chicago', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true});
  document.getElementById('liveClock').innerHTML = `${cdt}<span>CDT</span>`;
}
updateClock();
setInterval(updateClock, 1000);

const STORAGE_KEY = 'driverDash_v4';

const defaultData = {
  hiredLog: [],
  sections: [
    {
      id:"reefer", icon:"❄️", title:"Reefer", divStatus:"hiring", totalSlots:10,
      drivers:[
        {name:"Oybek Yusupov", company:"Sayram Express LLC", position:"Owner Operator", meta:"Ready Mar 2", status:"ready"},
        {name:"Odil Nazarov", company:"Sayram Express LLC", position:"Owner Operator", meta:"Ready Mar 2", status:"ready"},
        {name:"Driver TBD", company:"Iconic Logistics LLC", position:"Company Driver", meta:"Pre-approval", status:"preapproval"},
        {name:"Driver TBD", company:"Sayram Logistics Co", position:"Owner Operator", meta:"Pre-approval", status:"preapproval"}
      ]
    },
    {
      id:"walmart", icon:"🛒", title:"Walmart", divStatus:"hiring", totalSlots:5,
      drivers:[]
    },
    {
      id:"amazon", icon:"📦", title:"Amazon", divStatus:"full", totalSlots:4,
      drivers:[
        {name:"Amazon Driver 1", company:"Golden Mile LLC", position:"Company Driver", meta:"Active", status:"ready"},
        {name:"Amazon Driver 2", company:"Golden Mile LLC", position:"Company Driver", meta:"Active", status:"ready"},
        {name:"Amazon Driver 3", company:"Money Express INC", position:"Company Driver", meta:"Active", status:"ready"},
        {name:"Amazon Driver 4", company:"Money Express INC", position:"Company Driver", meta:"Active", status:"ready"}
      ]
    },
    {
      id:"portage", icon:"🏭", title:"Portage", divStatus:"hiring", totalSlots:6,
      drivers:[]
    },
    {
      id:"dryvan", icon:"🚐", title:"Dry Van", divStatus:"full", totalSlots:3,
      drivers:[
        {name:"Dry Van Driver 1", company:"Sayram Express LLC", position:"Owner Operator", meta:"Active", status:"ready"},
        {name:"Dry Van Driver 2", company:"Iconic Logistics LLC", position:"Company Driver", meta:"Active", status:"ready"},
        {name:"Dry Van Driver 3", company:"Sayram Logistics Co", position:"Company Driver", meta:"Active", status:"ready"}
      ]
    }
  ]
};

let data;
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultData));
  if(!data.hiredLog) data.hiredLog = [];
  data.sections.forEach((s,i) => {
    if(!s.totalSlots) s.totalSlots = defaultData.sections[i]?.totalSlots || 10;
    if(!s.divStatus) s.divStatus = 'hiring';
    if(!s.drivers) s.drivers = [];
  });
} catch(e) {
  data = JSON.parse(JSON.stringify(defaultData));
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const ind = document.getElementById('saveInd');
  ind.classList.add('show');
  setTimeout(()=>ind.classList.remove('show'), 1500);
}

function badgeClass(s){ return s==='ready'?'badge-ready':s==='preapproval'?'badge-preapproval':s==='hired'?'badge-hired':'badge-pending'; }
function badgeLabel(s){ return s==='ready'?'✅ Ready':s==='preapproval'?'🔵 Pre-Approval':s==='hired'?'🏆 Hired':'⏳ Pending'; }
function nextStatus(s){ return s==='preapproval'?'pending':s==='pending'?'ready':s==='ready'?'hired':'preapproval'; }

function render(){
  const dash = document.getElementById('dash');
  dash.innerHTML = '';

  data.sections.forEach((sec, si) => {
    const covered = sec.drivers.length;
    const total = sec.totalSlots || 10;
    const empty = Math.max(0, total - covered);
    const pct = total > 0 ? Math.round((covered / total) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'card';

    // Header
    const divStatusLabel = sec.divStatus === 'hiring' ? '🔴 Hiring' : sec.divStatus === 'urgent' ? '🚨 Urgent Hire' : '🟢 Full';
    const divStatusClass = sec.divStatus === 'hiring' ? 'div-status-hiring' : sec.divStatus === 'urgent' ? 'div-status-urgent' : 'div-status-full';
    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.innerHTML = `
      <div class="card-icon">${sec.icon}</div>
      <div class="card-title" contenteditable="true" data-si="${si}" data-field="title">${sec.title}</div>
      <div class="div-status ${divStatusClass}" onclick="cycleDivStatus(${si})">${divStatusLabel}</div>`;
    card.appendChild(hdr);

    // Progress bar
    const pb = document.createElement('div');
    const lastUpd = sec.lastUpdated ? sec.lastUpdated : '—';
    pb.className = 'progress-bar-wrap';
    pb.innerHTML = `
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${covered}<span>/${total} covered</span></div>
      <button class="last-updated" onclick="stampDate(${si})" title="Click to stamp today's date">🕒 ${lastUpd}</button>
      <button class="slots-count-edit" onclick="openSlotsModal(${si})">✏️ Edit slots</button>`;
    card.appendChild(pb);

    // Slots grid
    const sg = document.createElement('div');
    sg.className = 'slots-section';
    const grid = document.createElement('div');
    grid.className = 'slots-grid';

    sec.drivers.forEach((drv, di) => {
      const slot = document.createElement('div');
      slot.className = 'slot-covered';
      slot.innerHTML = `
        <div class="slot-name" contenteditable="true" data-si="${si}" data-di="${di}" data-field="drvName">${drv.name}</div>
        <div class="slot-company" contenteditable="true" data-si="${si}" data-di="${di}" data-field="drvCompany">${drv.company}</div>
        ${drv.position ? `<div class="slot-position">${drv.position}</div>` : ''}
        <div class="slot-notes" contenteditable="true" data-si="${si}" data-di="${di}" data-field="drvMeta">${drv.meta||''}</div>
        <div class="slot-badge-row">
          <div class="badge ${badgeClass(drv.status)}" onclick="cycleStatus(${si},${di})">${badgeLabel(drv.status)}</div>
        </div>
        <button class="slot-delete" onclick="deleteDriver(${si},${di})">✕</button>`;
      grid.appendChild(slot);
    });

    for(let e = 0; e < empty; e++){
      const slot = document.createElement('div');
      slot.className = 'slot-empty';
      slot.onclick = () => openAddDriver(si);
      slot.innerHTML = `<div class="slot-empty-plus">＋</div><div>Add Driver</div>`;
      grid.appendChild(slot);
    }

    sg.appendChild(grid);
    card.appendChild(sg);
    dash.appendChild(card);
  });

  dash.querySelectorAll('[contenteditable="true"]').forEach(el => {
    el.addEventListener('blur', () => {
      const si = +el.dataset.si, field = el.dataset.field, val = el.innerText.trim();
      if(field === 'title') data.sections[si].title = val;
      else if(field === 'drvName') data.sections[si].drivers[+el.dataset.di].name = val;
      else if(field === 'drvCompany') data.sections[si].drivers[+el.dataset.di].company = val;
      else if(field === 'drvMeta') data.sections[si].drivers[+el.dataset.di].meta = val;
      autoStamp(si); save();
    });
    el.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); el.blur(); } });
  });
}

function getWeekRange(){
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day===0?6:day-1)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return {start: mon.getTime(), end: sun.getTime()};
}
function renderHired(){
  const {start, end} = getWeekRange();
  const weekDrivers = data.hiredLog.filter(d => d.hiredAt >= start && d.hiredAt <= end);
  document.getElementById('hiredCount').textContent = weekDrivers.length;
  const mon = new Date(start), sun = new Date(end);
  document.getElementById('hiredWeekLabel').textContent =
    `${mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${sun.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const grid = document.getElementById('hiredGrid');
  if(weekDrivers.length === 0){
    grid.innerHTML = '<div class="hired-empty">No drivers hired this week yet 💪</div>';
  } else {
    grid.innerHTML = '<div class="hired-grid">' + weekDrivers.map((d,i) => `
      <div class="hired-card">
        <div class="hired-card-name">${d.name}</div>
        <div class="hired-card-division">${d.divisionIcon} ${d.division}</div>
        <div class="hired-card-meta">${d.company||''}${d.position?' · '+d.position:''}</div>
        <div class="hired-card-date">📅 Hired ${d.dateHired}</div>
        <button class="hired-card-delete" onclick="removeHired(${data.hiredLog.indexOf(d)})">✕</button>
      </div>`).join('') + '</div>';
  }
}
function toggleHiredReport(){
  const body = document.getElementById('hiredReportBody');
  const toggle = document.getElementById('hiredToggle');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  toggle.classList.toggle('open', !isOpen);
}
function removeHired(idx){ data.hiredLog.splice(idx,1); save(); renderHired(); }
function clearHired(){
  const {start,end} = getWeekRange();
  data.hiredLog = data.hiredLog.filter(d => d.hiredAt < start || d.hiredAt > end);
  save(); renderHired();
}

function autoStamp(si){
  const now = new Date();
  data.sections[si].lastUpdated = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function stampDate(si){ autoStamp(si); save(); render(); }
function cycleDivStatus(si){
  const cur = data.sections[si].divStatus;
  data.sections[si].divStatus = cur === 'hiring' ? 'urgent' : cur === 'urgent' ? 'full' : 'hiring';
  autoStamp(si); save(); render();
}
function cycleStatus(si, di){
  const drv = data.sections[si].drivers[di];
  const next = nextStatus(drv.status);
  if(next === 'hired'){
    const hired = {
      ...drv,
      division: data.sections[si].title,
      divisionIcon: data.sections[si].icon,
      dateHired: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      hiredAt: Date.now()
    };
    data.hiredLog.unshift(hired);
    data.sections[si].drivers.splice(di, 1);
    autoStamp(si); save(); render(); renderHired();
  } else {
    drv.status = next;
    autoStamp(si); save(); render();
  }
}
function deleteDriver(si, di){
  data.sections[si].drivers.splice(di, 1);
  autoStamp(si); save(); render();
}

let _ms = null;
function openAddDriver(si){
  _ms = si;
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>Full Name</label><input id="inp_name" placeholder="e.g. John Smith"></div>
    <div class="form-group"><label>Company</label><select id="inp_company">
      <option value="">— Select Company —</option>
      <option>Sayram Express LLC</option>
      <option>Iconic Logistics LLC</option>
      <option>Sayram Logistics Co</option>
      <option>Golden Mile LLC</option>
      <option>Money Express INC</option>
    </select></div>
    <div class="form-group"><label>Position</label><select id="inp_position">
      <option value="">— Select Position —</option>
      <option>Company Driver</option>
      <option>Lease Operator</option>
      <option>Owner Operator</option>
    </select></div>
    <div class="form-group"><label>Notes</label><input id="inp_meta" placeholder="e.g. Drug test pending"></div>
    <div class="form-group"><label>Status</label><select id="inp_status">
      <option value="preapproval">🔵 Pre-Approval</option>
      <option value="pending">⏳ Pending</option>
      <option value="ready">✅ Ready</option>
    </select></div>`;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inp_name').focus(), 50);
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function saveModalEntry(){
  const name = document.getElementById('inp_name').value.trim();
  if(!name) return;
  data.sections[_ms].drivers.push({
    name,
    company: document.getElementById('inp_company').value,
    position: document.getElementById('inp_position').value,
    meta: document.getElementById('inp_meta').value.trim(),
    status: document.getElementById('inp_status').value
  });
  closeModal(); autoStamp(_ms); save(); render();
}

let _ssi = null;
function openSlotsModal(si){
  _ssi = si;
  document.getElementById('slotsCountInput').value = data.sections[si].totalSlots || 10;
  document.getElementById('slotsModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('slotsCountInput').select(), 50);
}
function closeSlotsModal(){ document.getElementById('slotsModalOverlay').classList.remove('open'); }
function saveSlotsCount(){
  const val = parseInt(document.getElementById('slotsCountInput').value);
  if(!isNaN(val) && val >= 1){ data.sections[_ssi].totalSlots = val; autoStamp(_ssi); save(); render(); }
  closeSlotsModal();
}

document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('slotsModalOverlay').addEventListener('click', function(e){ if(e.target===this) closeSlotsModal(); });
document.addEventListener('keydown', e => {
  if(e.key==='Escape'){ closeModal(); closeSlotsModal(); }
  if(e.key==='Enter' && document.getElementById('modalOverlay').classList.contains('open') && document.activeElement.tagName==='INPUT') saveModalEntry();
  if(e.key==='Enter' && document.getElementById('slotsModalOverlay').classList.contains('open')) saveSlotsCount();
});

render();
renderHired();
</script>
</body>
</html>
